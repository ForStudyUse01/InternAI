services:
  - type: web
    name: internai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d
      - key: OTP_PROVIDER
        value: mock
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESUME_MAX_FILE_SIZE_MB
        value: 5
      - key: CLIENT_ORIGIN
        sync: false
